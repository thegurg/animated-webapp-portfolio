name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  flutter_test:
    name: Run flutter test and analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4           # ← обнови до v4

      - uses: actions/setup-java@v4         # ← обнови до v4
        with:
          java-version: '17'               # 12.x устарел, лучше 17 (или 21)
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2    # ← v2 актуальнее
        with:
          channel: 'stable'
          flutter-version: '3.x'            # или конкретная, если нужно

      - run: flutter pub get

      - run: flutter analyze

      - name: Run tests
        run: flutter test
        # или с игнором: run: flutter test || true
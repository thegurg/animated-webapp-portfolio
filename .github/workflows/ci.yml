name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [main]          
  pull_request:              
    branches: [main]
  workflow_dispatch:          

permissions:
  contents: write             

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release --base-href "/animated-webapp-portfolio/"  

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web       
          branch: gh-pages        
          clean: true             